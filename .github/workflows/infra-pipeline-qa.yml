# Infrastructure Pipeline — QA
# Ref CAF: Standard 14 - Infrastructure as Code, Standard 16 - CI/CD
#
# Pipeline para el ambiente QA apuntando a:
#   - terraform/environments/qa/
#   - environments/qa.yaml
#   - k8s/base/ y k8s/overlays/qa/

name: Infrastructure Pipeline — QA

on:
  workflow_dispatch:  # Permite disparar manualmente desde GitHub Actions UI o CLI
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/qa/**'
      - 'terraform/modules/**'
      - 'environments/qa.yaml'
      - 'k8s/base/**'
      - 'k8s/overlays/qa/**'
  push:
    branches: [main]
    paths:
      - 'terraform/environments/qa/**'
      - 'terraform/modules/**'
      - 'environments/qa.yaml'
      - 'k8s/base/**'
      - 'k8s/overlays/qa/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ─── Job 0: Leer configuración centralizada QA ───
  load-config:
    name: Load Config
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.config.outputs.project_id }}
      project_num: ${{ steps.config.outputs.project_num }}
      region: ${{ steps.config.outputs.region }}
      gke_cluster: ${{ steps.config.outputs.gke_cluster }}
      tf_version: ${{ steps.config.outputs.tf_version }}
      worker_pool: ${{ steps.config.outputs.worker_pool }}
      sa_email: ${{ steps.config.outputs.sa_email }}
      wif_provider: ${{ steps.config.outputs.wif_provider }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse environments/qa.yaml + shared.yaml
        id: config
        run: |
          sudo snap install yq
          # Parámetros del ambiente QA
          PROJECT_ID=$(yq '.gcp.project_id' environments/qa.yaml)
          PROJECT_NUM=$(yq '.gcp.project_number' environments/qa.yaml)
          REGION=$(yq '.gcp.region' environments/qa.yaml)
          GKE_CLUSTER=$(yq '.gke.cluster_name' environments/qa.yaml)
          TF_VERSION=$(yq '.versions.terraform' environments/qa.yaml)
          WORKER_POOL=$(yq '.cloud_build.worker_pool' environments/qa.yaml)
          # WIF y SA de deploy viven en Hub (migrado 2026-05-18)
          HUB_PROJECT_ID=$(yq '.hub.project_id' environments/shared.yaml)
          HUB_PROJECT_NUM=$(yq '.hub.project_number' environments/shared.yaml)
          DEPLOY_SA=$(yq '.qa_deploy.sa_name' environments/shared.yaml)
          WIF_POOL=$(yq '.wif.pool_name' environments/shared.yaml)
          WIF_PROVIDER=$(yq '.wif.provider_id' environments/shared.yaml)

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "project_num=$PROJECT_NUM" >> $GITHUB_OUTPUT
          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "gke_cluster=$GKE_CLUSTER" >> $GITHUB_OUTPUT
          echo "tf_version=$TF_VERSION" >> $GITHUB_OUTPUT
          echo "worker_pool=$WORKER_POOL" >> $GITHUB_OUTPUT
          # SA y WIF pool viven en Hub
          echo "sa_email=${DEPLOY_SA}@${HUB_PROJECT_ID}.iam.gserviceaccount.com" >> $GITHUB_OUTPUT
          echo "wif_provider=projects/${HUB_PROJECT_NUM}/locations/global/workloadIdentityPools/${WIF_POOL}/providers/${WIF_PROVIDER}" >> $GITHUB_OUTPUT

  # ─── Job 1: Terraform Plan (solo PRs con cambios en terraform/environments/qa/) ───
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [load-config]
    if: github.event_name == 'pull_request'
    env:
      WORKING_DIR: terraform/environments/qa
    steps:
      - uses: actions/checkout@v6

      - name: Check for terraform changes
        id: tf-changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- terraform/environments/qa/ environments/qa.yaml || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.tf-changes.outputs.has_changes == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.load-config.outputs.wif_provider }}
          service_account: ${{ needs.load-config.outputs.sa_email }}

      - uses: hashicorp/setup-terraform@v4
        if: steps.tf-changes.outputs.has_changes == 'true'
        with:
          terraform_version: ${{ needs.load-config.outputs.tf_version }}

      - name: Terraform Init
        if: steps.tf-changes.outputs.has_changes == 'true'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        if: steps.tf-changes.outputs.has_changes == 'true'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: steps.tf-changes.outputs.has_changes == 'true'
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment PR with plan
        if: steps.tf-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('cd ${{ env.WORKING_DIR }} && terraform show -no-color tfplan').toString();
            const planStatus = '${{ steps.plan.outcome }}';
            const icon = planStatus === 'success' ? '✅' : '❌';

            const body = `## ${icon} Terraform Plan — QA

            <details><summary>Show plan output</summary>

            \`\`\`
            ${plan.substring(0, 60000)}
            \`\`\`

            </details>

            **Status:** ${planStatus}
            `;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes('Terraform Plan — QA'));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

      - name: Fail if plan failed
        if: steps.tf-changes.outputs.has_changes == 'true' && steps.plan.outcome == 'failure'
        run: exit 1

  # ─── Job 2: Terraform Apply (merge a main con cambios en terraform/environments/qa/) ───
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [load-config]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    env:
      WORKING_DIR: terraform/environments/qa
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for terraform changes
        id: tf-changes
        run: |
          # workflow_dispatch siempre aplica (ejecución manual forzada)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # fetch-depth: 2 garantiza que HEAD~1 existe; el fallback cubre el primer commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- terraform/environments/qa/ environments/qa.yaml 2>/dev/null \
            || git diff --name-only HEAD -- terraform/environments/qa/ environments/qa.yaml || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.tf-changes.outputs.has_changes == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.load-config.outputs.wif_provider }}
          service_account: ${{ needs.load-config.outputs.sa_email }}

      - uses: hashicorp/setup-terraform@v4
        if: steps.tf-changes.outputs.has_changes == 'true'
        with:
          terraform_version: ${{ needs.load-config.outputs.tf_version }}

      - name: Terraform Init
        if: steps.tf-changes.outputs.has_changes == 'true'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply — Pass 1 (GKE + Cloud SQL)
        if: steps.tf-changes.outputs.has_changes == 'true'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Primer pass: crea solo el cluster GKE y Cloud SQL.
          # Los recursos kubernetes (namespaces, gateway) requieren que el cluster
          # esté activo para ser planificados — se aplican en el segundo pass.
          terraform apply -auto-approve \
            -target=module.gke \
            -target=module.cloud_sql \
            -target=data.google_service_account.sandbox_deploy

      - name: Terraform Apply — Pass 2 (Namespaces + Gateway)
        if: steps.tf-changes.outputs.has_changes == 'true'
        env:
          PROJECT_ID: ${{ needs.load-config.outputs.project_id }}
          GKE_CLUSTER: ${{ needs.load-config.outputs.gke_cluster }}
          REGION: ${{ needs.load-config.outputs.region }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Agregar IP del runner a Master Authorized Networks para que el
          # kubernetes provider de Terraform pueda alcanzar el API server del cluster.
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "Runner IP: ${RUNNER_IP}"

          CURRENT_NETWORKS=$(gcloud container clusters describe ${GKE_CLUSTER} \
            --region=${REGION} --project=${PROJECT_ID} \
            --format="value(masterAuthorizedNetworksConfig.cidrBlocks[].cidrBlock)" 2>/dev/null || echo "")

          if [ -n "${CURRENT_NETWORKS}" ]; then
            AUTH_NETWORKS="$(echo "${CURRENT_NETWORKS}" | tr ';' ','),${RUNNER_IP}/32"
          else
            AUTH_NETWORKS="${RUNNER_IP}/32"
          fi

          gcloud container clusters update ${GKE_CLUSTER} \
            --region=${REGION} --project=${PROJECT_ID} \
            --enable-master-authorized-networks \
            --master-authorized-networks="${AUTH_NETWORKS}" --quiet
          sleep 15

          # Segundo pass: aplica namespaces y gateway.
          terraform apply -auto-approve

          # Restaurar Master Authorized Networks al estado original
          if [ -n "${CURRENT_NETWORKS}" ]; then
            RESTORE_NETWORKS="$(echo "${CURRENT_NETWORKS}" | tr ';' ',')"
            gcloud container clusters update ${GKE_CLUSTER} \
              --region=${REGION} --project=${PROJECT_ID} \
              --enable-master-authorized-networks \
              --master-authorized-networks="${RESTORE_NETWORKS}" --quiet
          else
            gcloud container clusters update ${GKE_CLUSTER} \
              --region=${REGION} --project=${PROJECT_ID} \
              --no-enable-master-authorized-networks --quiet
          fi

  # ─── Job 3: K8s Manifests QA (merge a main con cambios en manifiestos) ───
  k8s-manifests:
    name: Apply K8s Manifests
    runs-on: ubuntu-latest
    needs: [load-config, terraform-apply]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for manifest changes
        id: k8s-changes
        run: |
          # workflow_dispatch siempre aplica (ejecución manual forzada)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # fetch-depth: 2 garantiza que HEAD~1 existe; el fallback cubre el primer commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- k8s/ 2>/dev/null \
            || git diff --name-only HEAD -- k8s/ || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.k8s-changes.outputs.has_changes == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.load-config.outputs.wif_provider }}
          service_account: ${{ needs.load-config.outputs.sa_email }}

      - name: Setup Cloud SDK
        if: steps.k8s-changes.outputs.has_changes == 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy manifests via Cloud Build
        if: steps.k8s-changes.outputs.has_changes == 'true'
        run: |
          cat > /tmp/k8s-deploy.yaml <<'CBEOF'
          steps:
            - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
              entrypoint: 'bash'
              args:
                - '-c'
                - |
                  set -euo pipefail

                  WORKER_IP=$$(curl -sf https://checkip.amazonaws.com)
                  echo "Worker IP: $${WORKER_IP}"

                  CURRENT_NETWORKS=$$(gcloud container clusters describe ${_GKE_CLUSTER} \
                    --region=${_REGION} --project=${_PROJECT_ID} \
                    --format="value(masterAuthorizedNetworksConfig.cidrBlocks[].cidrBlock)")
                  if [ -n "$${CURRENT_NETWORKS}" ]; then
                    AUTH_NETWORKS="$$(echo "$${CURRENT_NETWORKS}" | tr ';' ','),$${WORKER_IP}/32"
                  else
                    AUTH_NETWORKS="$${WORKER_IP}/32"
                  fi

                  gcloud container clusters update ${_GKE_CLUSTER} \
                    --region=${_REGION} --project=${_PROJECT_ID} \
                    --enable-master-authorized-networks \
                    --master-authorized-networks="$${AUTH_NETWORKS}" --quiet
                  sleep 10

                  gcloud container clusters get-credentials ${_GKE_CLUSTER} \
                    --region=${_REGION} --project=${_PROJECT_ID}

                  echo "=== Installing Dapr control plane (si no está instalado) ==="
                  DAPR_VERSION="1.17.3"
                  INSTALLED=$$(helm status dapr -n dapr-system --output json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['chart']['metadata']['version'])" 2>/dev/null || echo "none")
                  if [ "$${INSTALLED}" = "$${DAPR_VERSION}" ]; then
                    echo "Dapr $${DAPR_VERSION} ya está instalado — omitiendo."
                  else
                    echo "Instalando Dapr $${DAPR_VERSION} (instalado: $${INSTALLED})"
                    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                    helm repo add dapr https://dapr.github.io/helm-charts/ --force-update
                    helm upgrade --install dapr dapr/dapr \
                      --namespace dapr-system \
                      --create-namespace \
                      --version $${DAPR_VERSION} \
                      --wait --timeout 5m
                  fi

                  echo "=== Migrando Redis: eliminando Deployment legacy si existe ==="
                  kubectl delete deployment dapr-redis -n dapr-system --ignore-not-found=true
                  echo "=== Applying base resources (Redis) ==="
                  kubectl apply -f k8s/base/redis/

                  echo "=== Applying ip-masq-agent ConfigMap (SNAT para rango PSA 192.168.x.x) ==="
                  kubectl apply -f k8s/overlays/qa/ip-masq-agent.yaml || true

                  echo "=== Applying Dapr tracing config (base) ==="
                  for ns in access-manager segments base-config third-party accounting liquid-tax; do
                    kubectl apply -f k8s/base/dapr/tracing-config.yaml -n $$ns || true
                  done

                  echo "=== Applying observability components (base) ==="
                  kubectl apply -f k8s/base/observability/ --recursive || true

                  echo "=== Applying Dapr components overlay (qa) ==="
                  for dir in k8s/overlays/qa/dapr/*/; do
                    if [ -d "$$dir" ]; then
                      echo "  Applying $$dir"
                      kubectl apply -f "$$dir"
                    fi
                  done

                  echo "=== Applying routes (overlay qa) ==="
                  kubectl apply -f k8s/overlays/qa/routes/ || true

                  echo "=== Applying health checks (overlay qa) ==="
                  kubectl apply -f k8s/overlays/qa/healthcheck/ || true

                  echo "=== Applying import-map (overlay qa) ==="
                  kubectl apply -f k8s/overlays/qa/import-map/ || true

                  echo "=== All QA manifests applied ==="

                  if [ -n "$${CURRENT_NETWORKS}" ]; then
                    RESTORE_NETWORKS=$$(echo "$${CURRENT_NETWORKS}" | tr ';' ',')
                    gcloud container clusters update ${_GKE_CLUSTER} \
                      --region=${_REGION} --project=${_PROJECT_ID} \
                      --enable-master-authorized-networks \
                      --master-authorized-networks="$${RESTORE_NETWORKS}" --quiet
                  else
                    gcloud container clusters update ${_GKE_CLUSTER} \
                      --region=${_REGION} --project=${_PROJECT_ID} \
                      --no-enable-master-authorized-networks --quiet
                  fi
          substitutions:
            _GKE_CLUSTER: placeholder
            _REGION: placeholder
            _PROJECT_ID: placeholder
          options:
            pool:
              name: ${_WORKER_POOL}
          CBEOF

          tar czf /tmp/manifests.tar.gz k8s/

          BUILD_ID=$(gcloud builds submit /tmp/manifests.tar.gz \
            --project=${{ needs.load-config.outputs.project_id }} \
            --config=/tmp/k8s-deploy.yaml \
            --region=${{ needs.load-config.outputs.region }} \
            --substitutions=_GKE_CLUSTER=${{ needs.load-config.outputs.gke_cluster }},_REGION=${{ needs.load-config.outputs.region }},_PROJECT_ID=${{ needs.load-config.outputs.project_id }},_WORKER_POOL=${{ needs.load-config.outputs.worker_pool }} \
            --async --format='value(id)')
          echo "Cloud Build ID: $BUILD_ID"
          echo "Waiting for build to complete..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project=${{ needs.load-config.outputs.project_id }} --region=${{ needs.load-config.outputs.region }} --format='value(status)')
            echo "  Status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "QA K8s manifests deployed successfully!"; break ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED|INTERNAL_ERROR)
                echo "Build failed with status: $STATUS"
                gcloud builds log "$BUILD_ID" --project=${{ needs.load-config.outputs.project_id }} --region=${{ needs.load-config.outputs.region }} 2>/dev/null || true
                exit 1 ;;
              *) sleep 10 ;;
            esac
          done
