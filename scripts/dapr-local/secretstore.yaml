# Componente Dapr secret store para desarrollo local
# Apunta al mismo Secret Manager del proyecto dev.
# Auth: Application Default Credentials (gcloud auth application-default login)
#
# Prerequisito: tener roles/secretmanager.secretAccessor en el proyecto GCP.
# Copiar a: ~/.dapr/components/secretstore.yaml
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.gcp.secretmanager
  version: v1
  metadata:
    - name: projectId
      value: prj-sie-fin-financiero-dev
