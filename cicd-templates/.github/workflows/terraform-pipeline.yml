# Terraform Pipeline - Infrastructure as Code
# Ref CAF: Standard 14 - Infrastructure as Code
# Para el repo business-financiero-deploy
#
# NOTA: Este es el template de referencia. El workflow activo está en
# .github/workflows/infra-pipeline.yml y lee de project-config.yaml.

name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'project-config.yaml'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'project-config.yaml'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  load-config:
    name: Load Config
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.config.outputs.project_id }}
      project_num: ${{ steps.config.outputs.project_num }}
      tf_version: ${{ steps.config.outputs.tf_version }}
      sa_email: ${{ steps.config.outputs.sa_email }}
      wif_provider: ${{ steps.config.outputs.wif_provider }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse project-config.yaml
        id: config
        run: |
          sudo snap install yq
          PROJECT_ID=$(yq '.gcp.project_id' project-config.yaml)
          PROJECT_NUM=$(yq '.gcp.project_number' project-config.yaml)
          TF_VERSION=$(yq '.versions.terraform' project-config.yaml)
          DEPLOY_SA=$(yq '.deploy.sa_name' project-config.yaml)
          WIF_POOL=$(yq '.wif.pool_name' project-config.yaml)
          WIF_PROVIDER=$(yq '.wif.provider_id' project-config.yaml)

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "project_num=$PROJECT_NUM" >> $GITHUB_OUTPUT
          echo "tf_version=$TF_VERSION" >> $GITHUB_OUTPUT
          echo "sa_email=${DEPLOY_SA}@${PROJECT_ID}.iam.gserviceaccount.com" >> $GITHUB_OUTPUT
          echo "wif_provider=projects/${PROJECT_NUM}/locations/global/workloadIdentityPools/${WIF_POOL}/providers/${WIF_PROVIDER}" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [load-config]
    if: github.event_name == 'pull_request'
    env:
      WORKING_DIR: terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.load-config.outputs.wif_provider }}
          service_account: ${{ needs.load-config.outputs.sa_email }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.load-config.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment PR with plan
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('cd ${{ env.WORKING_DIR }} && terraform show -no-color tfplan').toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [load-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      WORKING_DIR: terraform/environments/dev
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.load-config.outputs.wif_provider }}
          service_account: ${{ needs.load-config.outputs.sa_email }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.load-config.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve
