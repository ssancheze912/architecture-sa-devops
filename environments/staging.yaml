# ============================================================================
# Configuración centralizada — Ambiente Staging
# ============================================================================
# Template: copiar environments/dev.yaml, reemplazar valores marcados <PLACEHOLDER>.
# Convención naming: sufijo "-stg" en lugar de "-dev".
#
# PASOS ANTES DE USAR:
#   1. Crear proyecto GCP prj-sie-fin-financiero-stg
#   2. Ejecutar terraform/bootstrap/ con el nuevo project_id
#   3. Completar todos los <PLACEHOLDER>
#   4. Crear terraform/environments/staging/main.tf (copiar dev/main.tf,
#      cambiar backend prefix y path del config a environments/staging.yaml)
#   5. Crear k8s/overlays/staging/ (copiar overlays/dev/, actualizar
#      projectId en dapr/**/pubsub.yaml+secretstore.yaml y gateway name en routes/)
#   6. Crear .github/workflows/infra-pipeline-staging.yml
# ============================================================================

gcp:
  project_id: <PLACEHOLDER: prj-sie-fin-financiero-stg>
  project_number: "<PLACEHOLDER>"
  region: us-east1

naming:
  business_unit: financiero
  product_suite: fin
  environment: staging

environment_suffix: stg

frontend:
  vite_mode: production  # staging valida en modo prod antes que llegar a prod

gke:
  cluster_name: <PLACEHOLDER: gke-sie-fin-financiero-stg>
  network: "projects/prj-sie-com-vpc-host-stg/global/networks/vpc-sie-shared-stg"
  subnetwork: "projects/prj-sie-com-vpc-host-stg/regions/us-east1/subnetworks/snt-sie-bus-fin-use1-stg"
  release_channel: REGULAR
  master_cidr: "<PLACEHOLDER: /28 distinto al de dev, ej: 172.16.0.32/28>"
  cluster_secondary_range_name: <PLACEHOLDER: pods-fin-use1-stg>
  services_secondary_range_name: <PLACEHOLDER: svc-fin-use1-stg>

database:
  type: cloud-sql
  engine: postgresql
  version: "POSTGRES_18"
  instance_name: <PLACEHOLDER: pgsql-fin-financiero-stg>
  database_name: <PLACEHOLDER: finance-stg>
  tier: db-g1-small
  availability: REGIONAL  # staging valida HA antes de llegar a prod
  edition: ENTERPRISE
  private_network: "projects/prj-sie-com-vpc-host-stg/global/networks/vpc-sie-shared-stg"

dns:
  zone_name: siesacloud-dev
  dns_name: "siesacloud.dev."
  domain: finance-stg.siesacloud.dev

gateway:
  name: financiero-stg-gateway
  namespace: gateway-infra
  class: gke-l7-global-external-managed
  cert_map: finance-stg-siesacloud-dev-map
  external_ip: null  # completar tras primer terraform apply

certificate:
  name: finance-stg-siesacloud-dev-cert

namespaces:
  - gateway-infra
  - app-shell
  - access-manager
  - segments
  - base-config
  - third-party
  - accounting
  - liquid-tax
  - observability

services:
  access-manager:
    sa_name: sa-sie-fin-accmgr-cicd
    github_repo: SiesaTeams/business-access-manager
    description: "Docker images for access-manager service"
  app-shell:
    sa_name: sa-sie-fin-appshell-cicd
    github_repo: SiesaTeams/business-financiero-app-shell
    description: "Docker images for app-shell SPA"
  segments:
    sa_name: sa-sie-fin-segments-cicd
    github_repo: SiesaTeams/business-financiero-segments-service
    description: "Docker images for segments service"
  base-config:
    sa_name: sa-sie-fin-baseconfig-cicd
    github_repo: SiesaTeams/business-financiero-base-config
    description: "Docker images for base-config service"
  third-party:
    sa_name: sa-sie-fin-tprt-cicd
    github_repo: SiesaTeams/business-financiero-third-party-service
    description: "Docker images for third-party service"
  accounting:
    sa_name: sa-sie-fin-acct-cicd
    github_repo: SiesaTeams/business-financiero-accounting-service
    description: "Docker images for accounting service"
  liquid-tax:
    sa_name: sa-sie-fin-liquid-tax-cicd
    github_repo: SiesaTeams/business-financiero-liquid-tax-service
    description: "Docker images for liquid-tax service"

deploy:
  sa_name: <PLACEHOLDER: sa-sie-fin-stg-cicd>
  github_repo: SiesaTeams/business-financiero-deploy
  roles:
    - roles/container.admin
    - roles/compute.securityAdmin
    - roles/compute.viewer
    - roles/artifactregistry.admin
    - roles/cloudsql.admin
    - roles/dns.admin
    - roles/iam.serviceAccountAdmin
    - roles/secretmanager.admin
    - roles/pubsub.admin
    - roles/storage.admin
    - roles/resourcemanager.projectIamAdmin
    - roles/cloudbuild.builds.editor
    - roles/cloudbuild.workerPoolUser
    - roles/certificatemanager.editor

wif:
  pool_name: github-actions
  provider_id: github

cloud_build:
  worker_pool: projects/<PLACEHOLDER: prj-sie-fin-financiero-stg>/locations/us-east1/workerPools/financiero-pool

redis:
  image: "redis:8-alpine"
  namespace: dapr-system
  service_name: dapr-redis
  port: 6379
  persistence:
    enabled: true
    storage_class: standard-rwo
    storage_size: 2Gi
    # PRODUCCIÓN: migrar a Google Cloud Memorystore

dev_access:
  admins_group: "<PLACEHOLDER: group:g-gcp-fld-sie-bus-financiero-stg-admins@siesacloud.com>"
  devs_group: "<PLACEHOLDER: group:g-gcp-fld-sie-bus-financiero-stg-devs@siesacloud.com>"

monitoring:
  alert_email: "<PLACEHOLDER: alertas-financiero@siesa.com>"

versions:
  terraform: "1.14"
  google_provider: "~> 7.0"
  dotnet: "10.0.x"
  node: "24"
  pnpm: "10"
