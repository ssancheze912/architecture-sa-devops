apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-users
  namespace: base-config
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /reconcile-users on the base-config app every 15 minutes.
    # Dapr binding name must match the registered route path (without leading slash).
    - name: schedule
      value: "@every 15m"
