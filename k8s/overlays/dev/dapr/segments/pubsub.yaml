apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: segments
spec:
  type: pubsub.gcp.pubsub
  version: v1
  metadata:
    - name: projectId
      value: prj-sie-fin-financiero-dev
    - name: disableEntityManagement
      # true: Dapr NO crea topics ni subscriptions automáticamente.
      # Los topics GCP deben existir ANTES de que este componente funcione.
      # Crearlos con google_pubsub_topic + google_pubsub_subscription en
      # terraform/environments/dev/main.tf. Los nombres exactos los
      # define el repo business-financiero-segments-service en sus llamadas a PublishEvent.
      value: "true"
