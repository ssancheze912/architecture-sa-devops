apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-users
  namespace: third-party
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /reconcile-users on the third-party app every hour.
    # Implemented: UserReconciliationJob fetches snapshot from accessmanager.access-manager.
    - name: schedule
      value: "@every 1h"
