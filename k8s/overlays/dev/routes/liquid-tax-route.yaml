apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: liquid-tax-route
  namespace: liquid-tax
  labels:
    app.kubernetes.io/name: liquid-tax
    app.kubernetes.io/part-of: financiero-platform
spec:
  parentRefs:
    - name: financiero-dev-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mfe/liquid-tax
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: liquid-tax-mfe
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/liquid-tax/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /health
      backendRefs:
        - name: liquid-tax-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/liquid-tax
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1
      backendRefs:
        - name: liquid-tax-api
          port: 8080
