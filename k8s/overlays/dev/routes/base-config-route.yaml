apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: base-config-route
  namespace: base-config
  labels:
    app.kubernetes.io/name: base-config
    app.kubernetes.io/part-of: financiero-platform
spec:
  parentRefs:
    - name: financiero-dev-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mfe/base-config
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: base-config-mfe
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/base-config/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /health
      backendRefs:
        - name: base-config-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/base-config
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1
      backendRefs:
        - name: base-config-api
          port: 8080
