apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: accounting-route
  namespace: accounting
  labels:
    app.kubernetes.io/name: accounting
    app.kubernetes.io/part-of: financiero-platform
spec:
  parentRefs:
    - name: financiero-dev-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/accounting/accounting-document-numbers
      backendRefs:
        - name: accounting-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /mfe/accounting
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: accounting-mfe
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/accounting/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /health
      backendRefs:
        - name: accounting-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/accounting
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1
      backendRefs:
        - name: accounting-api
          port: 8080
