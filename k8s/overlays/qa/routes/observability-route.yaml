apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: observability-route
  namespace: observability
spec:
  parentRefs:
    - name: financiero-qa-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /observability/jaeger
      backendRefs:
        - name: jaeger
          port: 16686
