apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-shell-route
  namespace: app-shell
  labels:
    app.kubernetes.io/name: app-shell
    app.kubernetes.io/part-of: financiero-platform
spec:
  parentRefs:
    - name: financiero-qa-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-shell
          port: 80
