apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: access-manager-route
  namespace: access-manager
  labels:
    app.kubernetes.io/name: access-manager
    app.kubernetes.io/part-of: financiero-platform
spec:
  parentRefs:
    - name: financiero-qa-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mfe/access-manager
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: access-manager-mfe
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/access-manager/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /health
      backendRefs:
        - name: access-manager-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/access-manager
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1
      backendRefs:
        - name: access-manager-api
          port: 8080
