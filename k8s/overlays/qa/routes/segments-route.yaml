apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: segments-route
  namespace: segments
spec:
  parentRefs:
    - name: financiero-qa-gateway
      namespace: gateway-infra
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mfe/segments
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: segments-mfe
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/segments/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /health
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/segments
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/segments
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/base
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/base
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/operation-centers
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/operation-centers
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/liquidtax
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/liquidtax
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/business-units
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/business-units
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/business-unit-groups
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/business-unit-groups
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/cost-centers
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/cost-centers
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/cost-center-groups
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/cost-center-groups
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/segment-configurations
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/segment-configurations
      backendRefs:
        - name: segments-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api/operation-center-groups
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/v1/operation-center-groups
      backendRefs:
        - name: segments-api
          port: 8080
