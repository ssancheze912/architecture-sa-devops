apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-companies
  namespace: third-party
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /reconcile-companies on the third-party app every hour.
    # Implemented: CompanyReconciliationJob fetches snapshot from segments.segments.
    - name: schedule
      value: "@every 1h"
