apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-neighborhoods
  namespace: segments
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /reconcile-neighborhoods on segments-api every hour.
    # Dapr binding name must match the registered route path (without leading slash).
    - name: schedule
      value: "@every 1h"
