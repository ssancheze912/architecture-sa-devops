apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-user-company-assignments
  namespace: liquid-tax
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /reconcile-user-company-assignments on liquid-tax every hour.
    # Dapr binding name must match the registered route path (without leading slash).
    - name: schedule
      value: "@every 1h"
