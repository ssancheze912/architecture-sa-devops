apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reconcile-companies
  namespace: base-config
spec:
  type: bindings.cron
  version: v1
  metadata:
    # Triggers POST /jobs/reconcile-companies on base-config every hour.
    # Dapr binding name must match the registered route path (without leading slash).
    - name: schedule
      value: "@every 1h"
