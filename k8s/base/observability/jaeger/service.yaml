apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: ui
    - name: zipkin
      port: 9411
      targetPort: zipkin
    - name: grpc-otlp
      port: 4317
      targetPort: grpc-otlp
    - name: admin
      port: 14269
      targetPort: admin
  # UI:     kubectl port-forward svc/jaeger 16686:16686 -n observability → http://localhost:16686
  # Dapr:   http://jaeger.observability.svc.cluster.local:9411/api/v2/spans  (interno, sin port-forward)
  # Admin:  GET / en :14269 → {"status":"Server available",...}  (health check canónico de Jaeger)
